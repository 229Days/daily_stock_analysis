# 适配 daily_stock_analysis 官方规范的工作流配置
name: 每日股票分析

# 触发规则：手动触发 + 工作日18:00（北京时间）自动触发（项目默认规则）
on:
  workflow_dispatch:  # 手动触发（测试用）
  schedule:
    - cron: '0 10 * * 1-5'  # 周一到周五 UTC 10点 = 北京时间18点（A股交易日）

jobs:
  stock-analysis:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码（项目官方必选步骤）
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置Python环境（项目要求3.10+）
      - name: Set up Python 3.10+
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'  # 缓存依赖，加速运行（项目推荐）

      # 3. 安装项目依赖（直接用项目官方的requirements.txt）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 执行分析脚本（核心步骤，注入所有已配置的Secrets）
      - name: Run daily stock analysis
        env:
          # AI模型（你已配置Gemini）
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 新闻源（你已配置Anspire，项目要求复数形式_KEYS）
          ANSPIRE_API_KEYS: ${{ secrets.ANSPIRE_API_KEY }}
          # 自选股（必填，项目官方命名）
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          # 邮箱通知（你已配置QQ邮箱，对齐项目官方命名）
          EMAIL_SENDER: ${{ secrets.QQ_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.QQ_EMAIL_AUTH_CODE }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          # 可选：指定默认AI模型（适配项目的LLM路由）
          DEFAULT_MODEL: "gemini/gemini-pro"
        run: |
          # 执行项目官方主脚本，启用调试模式（方便排查问题）
          python main.py --debug

      # 5. 推送分析报告到仓库（保存历史记录，项目推荐可选步骤）
      - name: Push analysis reports
        if: success()  # 仅分析成功时执行
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # 添加项目默认生成的reports目录下的报告
          git add reports/ || echo "No report files to commit"
          # 提交（无变更则跳过）
          git commit -m "Auto update: Stock analysis report $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push || echo "Push skipped (no new changes)"
