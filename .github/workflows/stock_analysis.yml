# 工作流名称（在GitHub Actions页面显示）
name: 每日股票分析自动运行

# 触发条件：定时触发 + 手动触发
on:
  # 手动触发（在Actions页面点「Run workflow」就能运行）
  workflow_dispatch:
  # 定时触发（Cron表达式，时区是UTC！UTC+8=北京时间，所以想北京时间18点运行，UTC是10点）
  schedule:
    - cron: '0 10 * * *'  # 格式：分 时 日 月 周 → 每天UTC10点（北京时间18点）运行

# 要执行的任务
jobs:
  run-stock-analysis:
    # 运行环境：选Ubuntu最新版（GitHub提供的虚拟机）
    runs-on: ubuntu-latest
    
    # 任务步骤
    steps:
      # 步骤1：把仓库代码拉到虚拟机中
      - name: 拉取仓库代码
        uses: actions/checkout@v4  # 官方的「拉取代码」动作

      # 步骤2：设置Python环境（匹配项目需要的版本，比如3.9）
      - name: 设置Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'  # 可改成3.8+/3.10+，和项目兼容即可

      # 步骤3：安装项目依赖
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          # 如果项目有requirements.txt，执行下面这行；没有就手动写依赖（比如tushare akshare）
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install pandas tushare akshare matplotlib; fi

      # 步骤4：配置Tushare Token（关键！替换成你的Token）
      - name: 设置环境变量（Tushare Token）
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}  # 从GitHub Secrets读取Token（避免硬编码）
        run: |
          # 把Token写入项目的配置文件（假设项目有config.py，没有就直接在脚本里读环境变量）
          echo "TUSHARE_TOKEN = '$TUSHARE_TOKEN'" > config.py

      # 步骤5：运行股票分析脚本（替换成你项目的主脚本名，比如main.py）
      - name: 执行分析脚本
        run: |
          python main.py

      # （可选）步骤6：把运行结果保存回仓库（比如分析后的CSV/图片）
      - name: 提交并推送结果
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .  # 添加所有修改的文件（如结果文件）
          git commit -m "Auto update stock analysis result $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
