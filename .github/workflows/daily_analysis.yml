name: 每日股票分析

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1-5'

jobs:
  stock-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 解决推送冲突

      - name: 设置Python 3.10+
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: 执行分析（强制指定Anspire/TickFlow）
        env:
          # ===== 关键：强制指定搜索服务商为Anspire =====
          SEARCH_PROVIDER: "anspire"  # 覆盖默认的searxng
          ANSPIRE_API_KEY: ${{ secrets.ANSPIRE_API_KEY }}
          
          # ===== 关键：强制指定数据源为TickFlow =====
          DATA_PROVIDER: "tickflow"  # 覆盖默认数据源
          TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
          
          # 其他配置
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_EMAIL_AUTH_CODE: ${{ secrets.QQ_EMAIL_AUTH_CODE }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          ENABLE_REALTIME_QUOTE: ${{ secrets.ENABLE_REALTIME_QUOTE }}
        run: |
          # 执行脚本并保存日志
          python main.py --debug > analysis_log.txt 2>&1
          cat analysis_log.txt | head -200  # 显示更多日志

      - name: 推送报告和日志到仓库
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # 确保reports目录存在（防止空目录不提交）
          mkdir -p reports
          touch reports/.gitkeep  # 空目录提交占位符
          # 添加所有生成的文件
          git add reports/ analysis_log.txt
          # 提交（避免重复提交）
          git commit -m "Auto update: 分析报告_$(date +'%Y-%m-%d_%H%M%S')" || echo "无新内容"
          # 推送（用内置token授权）
          git push https://${{ github.actor }}:${{ github.token }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }} || echo "推送失败"
