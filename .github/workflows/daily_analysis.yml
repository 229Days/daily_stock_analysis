name: 每日股票分析

# 触发规则完全对齐项目官方：手动触发 + 工作日18点（UTC 10点）
on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1-5'

jobs:
  stock-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置Python 3.10+
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装项目依赖
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: 执行股票分析（仅注入Secrets，其余逻辑项目内置）
        env:
          # AI模型（你已配置Gemini）
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 新闻源（项目官方要求复数形式 ANSPIRE_API_KEYS）
          ANSPIRE_API_KEYS: ${{ secrets.ANSPIRE_API_KEY }}
          # 自选股（必填）
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          # 邮箱通知（项目官方命名：EMAIL_SENDER/EMAIL_PASSWORD）
          EMAIL_SENDER: ${{ secrets.QQ_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.QQ_EMAIL_AUTH_CODE }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          # 你的额外配置（TickFlow/实时行情）
          TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
          ENABLE_REALTIME_QUOTE: ${{ secrets.ENABLE_REALTIME_QUOTE }}
        run: python main.py --debug
