name: 每日股票分析

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1-5'

jobs:
  stock-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 解决浅克隆冲突

      - name: 设置Python 3.10+
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: 执行分析
        env:
          # 股票配置
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_EMAIL_AUTH_CODE: ${{ secrets.QQ_EMAIL_AUTH_CODE }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          ENABLE_REALTIME_QUOTE: ${{ secrets.ENABLE_REALTIME_QUOTE }}
        run: |
          python main.py --debug > analysis_log.txt 2>&1
          cat analysis_log.txt | head -200

      # 修复权限的推送步骤
      - name: Push analysis reports
        if: success()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -f reports/ || echo "No report files to commit"
          git add -f analysis_log.txt || echo "No log file to commit"
          git commit -m "Auto update: Stock analysis report $(date +'%Y-%m-%d')" || echo "No changes to commit"
          # 用GITHUB_TOKEN授权推送
          git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }} || echo "Push skipped (no new changes)"
