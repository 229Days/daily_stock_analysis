name: 每日股票分析

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1-5'

jobs:
  stock-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 关键：拉取完整仓库历史，避免提交冲突

      - name: 设置Python 3.10+
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: 执行分析（注入所有Secrets到环境变量）
        env:
          # Anspire 搜索服务
          ANSPIRE_API_KEY: ${{ secrets.ANSPIRE_API_KEY }}
          ENABLE_ANSPIRE_SEARCH: "True"
          # TickFlow 数据源
          TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}
          ENABLE_TICKFLOW_DATA: "True"
          # 其他配置
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_EMAIL_AUTH_CODE: ${{ secrets.QQ_EMAIL_AUTH_CODE }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          ENABLE_REALTIME_QUOTE: ${{ secrets.ENABLE_REALTIME_QUOTE }}
        run: |
          # 执行脚本并输出日志到文件（方便排查）
          python main.py --debug > analysis_log.txt 2>&1
          # 查看日志前100行（确认执行结果）
          cat analysis_log.txt | head -100

      # ========== 新增：推送报告/日志到仓库 ==========
      - name: 推送报告和日志到仓库
        if: always()  # 无论执行成功/失败，都推送日志
        run: |
          # 配置git用户（必须）
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # 添加所有生成的文件（报告+日志）
          git add reports/ analysis_log.txt || echo "无报告/日志文件"
          # 提交（无变更则跳过）
          git commit -m "Auto update: 股票分析报告_$(date +'%Y-%m-%d_%H%M%S')" || echo "无新内容可提交"
          # 推送（解决权限问题）
          git push https://${{ github.actor }}:${{ github.token }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }} || echo "推送失败（无新内容）"
