name: 每日股票分析

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1-5'

jobs:
  stock-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置Python 3.10+
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: 执行分析（注入所有Secrets到环境变量）
        env:
          # 1. Anspire 搜索服务（代码侧默认读取的变量名）
          ANSPIRE_API_KEY: ${{ secrets.ANSPIRE_API_KEY }}  # 直接用你配置的Secret名
          ENABLE_ANSPIRE_SEARCH: "True"  # 关键：启用Anspire搜索（代码侧开关）
          
          # 2. TickFlow 数据源（代码侧默认读取的变量名）
          TICKFLOW_API_KEY: ${{ secrets.TICKFLOW_API_KEY }}  # 你配置的Secret名
          ENABLE_TICKFLOW_DATA: "True"  # 关键：启用TickFlow数据源（代码侧开关）
          
          # 3. 其他已配置的Secret
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_EMAIL_AUTH_CODE: ${{ secrets.QQ_EMAIL_AUTH_CODE }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          ENABLE_REALTIME_QUOTE: ${{ secrets.ENABLE_REALTIME_QUOTE }}
        run: python main.py --debug
